version: "3.2"

services:
  swarm-dashboard:
    image: ${SWARM_DASHBOARD_IMAGE:-swarm-dashboard:test-cluster}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 8080:8080
    environment:
      PORT: 8080
      ENABLE_AUTHENTICATION: "false"
      ENABLE_HTTPS: "false"
      NODE_EXPORTER_SERVICE_NAME_REGEX: "node-exporter"
      CADVISOR_SERVICE_NAME_REGEX: "cadvisor"
      DOCKER_SOCKET: "tcp://dockerproxy:2375"
    networks:
      - monitoring_net

  dockerproxy:
    image: tecnativa/docker-socket-proxy
    container_name: dockerproxy
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:2375:2375"
    environment:
      NODES: 1
      NETWORKS: 1
      SERVICES: 1
      TASKS: 1
    networks:
      - monitoring_net

networks:
  monitoring_net:
    external:
      name: sd_monitoring_net
